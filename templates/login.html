<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - DriveGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #0ea5e9;
            --card-bg: rgba(255,255,255,0.60);
            --input-bg: rgba(255,255,255,0.7);
            --text: #1e293b;
            --muted: #64748b;
            --font: 'Inter', sans-serif;
        }
        html, body { height: 100%; color: var(--text); font-family: var(--font); overflow: hidden; }
        body {
            background-color: #f0f9ff;
            background-image:
                radial-gradient(at 0% 0%, hsla(199,89%,84%,1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(187,92%,90%,1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(217,91%,95%,1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(199,89%,84%,1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, hsla(210,100%,98%,1) 0px, transparent 50%);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        body::before { content:''; position:fixed; width:500px; height:500px; border-radius:50%; filter:blur(80px); z-index:0; opacity:0.45; top:-10%; left:-10%; background:#bae6fd; pointer-events:none; }
        body::after  { content:''; position:fixed; width:500px; height:500px; border-radius:50%; filter:blur(80px); z-index:0; opacity:0.4;  bottom:-10%; right:-10%; background:#7dd3fc; pointer-events:none; }
        .material-symbols-outlined { font-variation-settings:'FILL' 1,'wght' 300,'GRAD' 0,'opsz' 24; line-height:1; vertical-align:middle; }
        .toast-notif { position:fixed; top:-100px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.88); backdrop-filter:blur(20px); border:1px solid rgba(14,165,233,0.4); padding:12px 24px; border-radius:12px; display:flex; align-items:center; gap:10px; z-index:1000; transition:top 0.4s cubic-bezier(0.68,-0.55,0.27,1.55); box-shadow:0 10px 30px rgba(14,165,233,0.15); font-size:0.85rem; font-weight:600; white-space:nowrap; color:#1e293b; }
        .toast-notif.show { top: 20px; }
        .toast-notif .material-symbols-outlined { color: var(--primary); font-size: 1.2rem; }
        .glass-card {
            background: rgba(255,255,255,0.62);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.78);
            border-top: 1.5px solid rgba(255,255,255,0.92);
            border-left: 1.5px solid rgba(255,255,255,0.92);
            border-radius: 32px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(14,165,233,0.12), 0 8px 20px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
            position: relative;
            z-index: 10;
            animation: fadeUp 0.6s ease-out both;
        }
        .avatar-circle {
            width:100px; height:100px; border-radius:50%; border:2px solid var(--primary);
            display:flex; align-items:center; justify-content:center; margin:0 auto 30px auto;
            box-shadow:0 0 25px rgba(14,165,233,0.3), inset 0 0 15px rgba(14,165,233,0.1);
            background:rgba(14,165,233,0.07);
        }
        .avatar-circle .material-symbols-outlined { font-size:3rem; color:var(--primary); font-variation-settings:'FILL' 0; }
        .form-fields { display:flex; flex-direction:column; gap:16px; }
        .input-wrap { position:relative; }
        .input-wrap .material-symbols-outlined { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:#0ea5e9; font-size:1.2rem; pointer-events:none; opacity:0.75; }
        .input-wrap input { width:100%; background:rgba(255,255,255,0.72); border:1.5px solid rgba(14,165,233,0.22); color:#1e293b; font-family:var(--font); font-size:0.95rem; border-radius:12px; padding:15px 16px 15px 50px; outline:none; transition:all 0.3s; }
        .input-wrap input::placeholder { color:#94a3b8; }
        .input-wrap input:focus { box-shadow:0 0 0 2px rgba(14,165,233,0.35); background:rgba(255,255,255,0.92); border-color:var(--primary); }
        .options-row { display:flex; justify-content:space-between; align-items:center; font-size:0.8rem; margin-top:4px; margin-bottom:8px; }
        .remember-me { display:flex; align-items:center; gap:6px; color:#64748b; cursor:pointer; }
        .remember-me input { accent-color:var(--primary); width:14px; height:14px; cursor:pointer; }
        .forgot-link { color:#0ea5e9; text-decoration:none; font-style:italic; transition:color 0.2s; }
        .forgot-link:hover { color:#0284c7; }
        .login-btn { width:100%; background:linear-gradient(135deg,#0ea5e9,#0284c7); color:#fff; border:none; border-radius:12px; padding:16px; font-family:var(--font); font-size:1rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:10px; box-shadow:0 6px 20px rgba(14,165,233,0.35); }
        .login-btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(14,165,233,0.5); }
        .login-btn:active { transform:scale(0.98); }
        .login-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .divider { display:flex; align-items:center; gap:12px; color:#94a3b8; font-size:0.78rem; margin:24px 0 16px; }
        .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(14,165,233,0.2); }
        .signup-row { text-align:center; font-size:0.88rem; color:#64748b; }
        .signup-row a { color:var(--primary); font-weight:600; text-decoration:none; transition:color 0.2s; }
        .signup-row a:hover { color:#0284c7; }
        .err-msg { font-size:0.78rem; color:#ef4444; padding-left:4px; margin-top:-10px; display:none; }
        .err-msg.show { display:block; }
        .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        #otpStep { display:none; }
        #otpStep.active { display:block; animation:fadeUp 0.4s ease both; }
        #loginStep { display:block; }
        #loginStep.hidden { display:none; }
        .otp-boxes { display:flex; gap:8px; justify-content:center; margin:24px 0; }
        .otp-boxes input { width:44px; height:52px; text-align:center; font-size:1.4rem; font-weight:700; background:rgba(255,255,255,0.72); border:1.5px solid rgba(14,165,233,0.22); border-radius:12px; color:#1e293b; font-family:var(--font); outline:none; transition:all 0.3s; }
        .otp-boxes input:focus { border-color:var(--primary); box-shadow:0 0 12px rgba(14,165,233,0.35); background:rgba(255,255,255,0.92); }
        .otp-info { font-size:0.85rem; color:#64748b; text-align:center; margin-bottom:8px; }
        .otp-info span { color:var(--primary); font-weight:600; }
        .resend-row { text-align:center; font-size:0.82rem; color:#64748b; margin-top:16px; }
        .resend-row button { background:none; border:none; color:var(--primary); font-weight:600; font-family:var(--font); cursor:pointer; font-size:0.82rem; }
        .resend-row button:disabled { color:rgba(14,165,233,0.3); cursor:not-allowed; }
        .back-btn { background:none; border:none; color:#94a3b8; font-family:var(--font); font-size:0.85rem; cursor:pointer; display:flex; align-items:center; gap:4px; position:absolute; top:24px; left:24px; transition:color 0.2s; }
        .back-btn:hover { color:#0ea5e9; }
        .home-btn { background:none; border:none; color:#94a3b8; font-family:var(--font); font-size:0.85rem; cursor:pointer; display:flex; align-items:center; gap:4px; position:absolute; top:24px; right:24px; transition:color 0.2s; text-decoration:none; }
        .home-btn:hover { color:#0ea5e9; }
        .otp-title { text-align:center; font-size:1.4rem; font-weight:700; color:#1e293b; margin-bottom:8px; margin-top:20px; }
        /* ── DARK MODE ── */
        [data-theme="dark"] body { background-color:#0f172a !important; background-image:none !important; }
        [data-theme="dark"] body::before { background:radial-gradient(circle at 20% 20%, rgba(14,165,233,0.18) 0%, transparent 55%) !important; filter:none !important; }
        [data-theme="dark"] body::after  { background:radial-gradient(circle at 80% 80%, rgba(30,58,138,0.4) 0%, transparent 55%) !important; filter:none !important; }
        [data-theme="dark"] .glass-card { background:rgba(15,23,42,0.85) !important; border-color:rgba(14,165,233,0.3) !important; box-shadow:0 25px 60px rgba(0,0,0,0.55), 0 0 40px rgba(14,165,233,0.08), inset 0 1px 0 rgba(255,255,255,0.05) !important; }
        [data-theme="dark"] .input-wrap input { background:rgba(2,44,94,0.6) !important; border-color:rgba(14,165,233,0.2) !important; color:#e2e8f0 !important; }
        [data-theme="dark"] .input-wrap input:focus { background:rgba(2,44,94,0.85) !important; border-color:var(--primary) !important; }
        [data-theme="dark"] .input-wrap input::placeholder { color:#475569 !important; }
        [data-theme="dark"] .input-wrap .material-symbols-outlined { color:#38bdf8 !important; }
        [data-theme="dark"] .signup-row,[data-theme="dark"] .otp-info,[data-theme="dark"] .resend-row,[data-theme="dark"] .remember-me { color:#94a3b8 !important; }
        [data-theme="dark"] .otp-title { color:#f1f5f9 !important; }
        [data-theme="dark"] .back-btn,[data-theme="dark"] .home-btn { color:#64748b !important; }
        [data-theme="dark"] .back-btn:hover,[data-theme="dark"] .home-btn:hover { color:#38bdf8 !important; }
        [data-theme="dark"] .otp-boxes input { background:rgba(2,44,94,0.6) !important; border-color:rgba(14,165,233,0.2) !important; color:#e2e8f0 !important; }
        [data-theme="dark"] .toast-notif { background:rgba(15,23,42,0.9) !important; border-color:var(--primary) !important; color:#fff !important; }
        [data-theme="dark"] .forgot-link { color:#38bdf8 !important; }
        [data-theme="dark"] .divider { color:#475569 !important; }
        [data-theme="dark"] .divider::before,[data-theme="dark"] .divider::after { background:rgba(71,85,105,0.5) !important; }
    </style>
<script>
/* DriveGO Global Theme System */
(function(){
    var t = localStorage.getItem('drivego_theme') || 'light';
    var resolved = (t === 'system') ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : t;
    document.documentElement.setAttribute('data-theme', resolved);
})();
</script>
<style>
/* === DriveGO Global Dark Mode === */
[data-theme="dark"] body,
[data-theme="dark"] .bg-main-mesh {
    background-color: #0f172a !important;
    background-image: none !important;
    color: #e2e8f0 !important;
}
[data-theme="dark"] body::before {
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%) !important;
}
[data-theme="dark"] body::after { background: none !important; }
[data-theme="dark"] .glass-panel,
[data-theme="dark"] [class*="bg-white/4"],
[data-theme="dark"] [class*="bg-white/5"],
[data-theme="dark"] [class*="bg-white/6"],
[data-theme="dark"] [class*="bg-white/3"] {
    background: rgba(30,41,59,0.88) !important;
    border-color: rgba(71,85,105,0.45) !important;
}
[data-theme="dark"] h1,[data-theme="dark"] h2,[data-theme="dark"] h3 { color: #f1f5f9 !important; }
[data-theme="dark"] p,[data-theme="dark"] span:not([class*="text-sky"]):not([class*="text-emerald"]):not([class*="text-red"]):not([class*="text-amber"]):not([class*="text-yellow"]) { color: inherit; }
[data-theme="dark"] .text-slate-900 { color: #f1f5f9 !important; }
[data-theme="dark"] .text-slate-800 { color: #e2e8f0 !important; }
[data-theme="dark"] .text-slate-700 { color: #cbd5e1 !important; }
[data-theme="dark"] .text-slate-600 { color: #94a3b8 !important; }
[data-theme="dark"] .text-slate-500 { color: #64748b !important; }
[data-theme="dark"] [class*="border-white/"] { border-color: rgba(71,85,105,0.4) !important; }
[data-theme="dark"] input:not([type="submit"]):not([type="button"]),
[data-theme="dark"] .input-box,
[data-theme="dark"] select,
[data-theme="dark"] textarea {
    background: rgba(15,23,42,0.75) !important;
    color: #e2e8f0 !important;
    border-color: rgba(71,85,105,0.6) !important;
}
[data-theme="dark"] input::placeholder,
[data-theme="dark"] textarea::placeholder { color: #475569 !important; }
[data-theme="dark"] header { background: rgba(15,23,42,0.92) !important; border-color: rgba(71,85,105,0.3) !important; }
[data-theme="dark"] nav { background: rgba(15,23,42,0.9) !important; }
[data-theme="dark"] .glass-nav,
[data-theme="dark"] #nav-container { background: rgba(15,23,42,0.92) !important; border-color: rgba(71,85,105,0.3) !important; }
[data-theme="dark"] label { color: #cbd5e1 !important; }
[data-theme="dark"] .bg-white { background: #1e293b !important; }
[data-theme="dark"] .bg-sky-50 { background: rgba(14,165,233,0.1) !important; }
[data-theme="dark"] .bg-slate-100,
[data-theme="dark"] .bg-slate-200 { background: rgba(30,41,59,0.7) !important; }
[data-theme="dark"] :root {
    --bg: #0f172a;
    --glass: linear-gradient(135deg, rgba(30,41,59,0.88), rgba(15,23,42,0.75));
    --border: rgba(71,85,105,0.45);
    --border-highlight: rgba(100,116,139,0.6);
    --card-bg: rgba(30,41,59,0.8);
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
}
</style>
</head>
<body>
    <div id="toast" class="toast-notif">
        <span class="material-symbols-outlined">notifications_active</span>
        <span id="toast-msg">Welcome back!</span>
    </div>

    <div class="glass-card">
        <a href="{% url 'index' %}" class="home-btn" aria-label="Go to Home">
            <span class="material-symbols-outlined" style="font-size: 1.2rem;">home</span>
        </a>

        <div id="loginStep">
            <div class="avatar-circle">
                <span class="material-symbols-outlined">photo_camera</span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-fields">
                    <div class="input-wrap">
                        <span class="material-symbols-outlined">person</span>
                        <input type="text" id="loginusername" placeholder="Username" autocomplete="username" />
                    </div>
                    <div class="err-msg" id="err-user">Please enter your username.</div>
                    
                    <div class="input-wrap">
                        <span class="material-symbols-outlined">lock</span>
                        <input type="password" id="loginpassword" placeholder="*************" autocomplete="current-password" />
                    </div>
                    <div class="err-msg" id="err-pass">Please enter your password.</div>
                    

                    
                    <div class="input-wrap">
                        <span class="material-symbols-outlined">email</span>
                        <input type="email" id="loginEmail" placeholder="Email (for OTP verification)" autocomplete="email" />
                    </div>
                    <div class="err-msg" id="err-email">Please enter a valid email.</div>
                    
                    <div class="options-row">
                        <label class="remember-me">
                            <input type="checkbox" checked>
                            Remember me
                        </label>
                        <a href="{% url 'changepassword' %}" class="forgot-link">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="login-btn" id="loginBtn">
                        <span id="btnText">LOGIN</span>
                        <div class="spinner" id="spinner"></div>
                    </button>
                </div>
            </form>
            
            <div class="divider">or</div>
            <div class="signup-row">Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></div>
        </div>

        <div id="otpStep">
            <button class="back-btn" onclick="goBack()" aria-label="Go back">
                <span class="material-symbols-outlined" style="font-size:1.2rem">arrow_back</span>
            </button>
            
            <div class="avatar-circle" style="margin-top: 10px; margin-bottom: 10px; width: 80px; height: 80px;">
                <span class="material-symbols-outlined" style="font-size: 2.2rem;">mark_email_read</span>
            </div>

            <div class="otp-title">Verify Email</div>
            <p class="otp-info">Code sent to <br/><span id="otpEmailDisplay"></span></p>
            
            <div class="otp-boxes">
                <input type="tel" maxlength="1" id="o0" />
                <input type="tel" maxlength="1" id="o1" />
                <input type="tel" maxlength="1" id="o2" />
                <input type="tel" maxlength="1" id="o3" />
                <input type="tel" maxlength="1" id="o4" />
                <input type="tel" maxlength="1" id="o5" />
            </div>
            <div class="err-msg" id="err-otp" style="text-align:center;margin-bottom:10px;"></div>
            
            <button class="login-btn" id="verifyBtn" onclick="verifyOtp()">
                <span id="verifyText">VERIFY</span>
                <div class="spinner" id="verifySpinner"></div>
            </button>
            
            <div class="resend-row">
                Didn't receive it?
                <button id="resendBtn" onclick="resendOtp()">Resend OTP</button>
            </div>
        </div>
    </div>

    <script>
        const VEHICLE_ID = 'VH-001';
        const API_URLS = {
            startLogin: "{% url 'locksystem:auth_start_login' %}",
            verifyLoginOtp: "{% url 'locksystem:auth_verify_login_otp' %}"
        };

        function prettyBackendError(message) {
            if (!message) return "Server error. Please try again.";
            if (message.includes("Email is not configured")) {
                return "OTP mail is not configured on server. Set EMAIL_HOST_USER and EMAIL_HOST_PASSWORD, then restart Django server.";
            }
            return message;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.onload = async () => {
            showToast('DriveGO Systems Online');
            for (let i = 0; i < 6; i++) {
                const box = document.getElementById('o' + i);
                box.addEventListener('input', () => {
                    if (box.value && i < 5) document.getElementById('o' + (i + 1)).focus();
                });
                box.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !box.value && i > 0)
                        document.getElementById('o' + (i - 1)).focus();
                });
            }
        };

        let currentEmail = '';
        let currentUser = null;

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginusername').value.trim();
            const password = document.getElementById('loginpassword').value.trim();
            const email    = document.getElementById('loginEmail').value.trim();

            document.getElementById('err-user').classList.remove('show');
            document.getElementById('err-pass').classList.remove('show');
            document.getElementById('err-email').classList.remove('show');

            let valid = true;
            if (!username) { document.getElementById('err-user').classList.add('show'); valid = false; }
            if (!password) { document.getElementById('err-pass').classList.add('show'); valid = false; }
            if (!email || !email.includes('@')) { document.getElementById('err-email').classList.add('show'); valid = false; }
            if (!valid) return;

            const btn     = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            btn.disabled          = true;
            btnText.textContent   = 'VERIFYING...';
            spinner.style.display = 'block';

            try {
                const loginRes = await fetch(API_URLS.startLogin, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: JSON.stringify({ username, password, email, vehicle_id: VEHICLE_ID })
                });
                const loginData = await loginRes.json();

                if (!loginData.success) {
                    throw new Error(prettyBackendError(loginData.message || "Invalid login details."));
                }

                if (loginData.success) {
                    currentEmail = email;
                    document.getElementById('otpEmailDisplay').textContent = currentEmail;
                    document.getElementById('loginStep').classList.add('hidden');
                    document.getElementById('otpStep').classList.add('active');
                    if (loginData.debug_otp) {
                        showToast(`Debug OTP: ${loginData.debug_otp}`);
                    }
                    document.getElementById('o0').focus();
                    showToast('OTP sent to your email');
                }
            } catch (err) {
                showToast(prettyBackendError(err.message || "Server error. Is the backend running?"));
            }

            btn.disabled          = false;
            btnText.textContent   = 'LOGIN';
            spinner.style.display = 'none';
        }

        async function verifyOtp() {
            let otp = '';
            for (let i = 0; i < 6; i++) otp += document.getElementById('o' + i).value;

            const errOtp = document.getElementById('err-otp');
            errOtp.classList.remove('show');

            if (otp.length < 6) {
                errOtp.textContent = 'Please enter all 6 digits.';
                errOtp.classList.add('show');
                return;
            }

            const btn     = document.getElementById('verifyBtn');
            const text    = document.getElementById('verifyText');
            const spinner = document.getElementById('verifySpinner');

            btn.disabled          = true;
            text.textContent      = 'VERIFYING...';
            spinner.style.display = 'block';

            try {
                const res  = await fetch(API_URLS.verifyLoginOtp, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: JSON.stringify({ email: currentEmail, otp, vehicle_id: VEHICLE_ID })
                });
                const data = await res.json();

                if (data.success) {
                    showToast('Verified! Welcome to DriveGO');
                    setTimeout(() => window.location.href = "{% url 'index' %}", 1200);
                } else {
                    errOtp.textContent = prettyBackendError(data.message || "Invalid OTP. Try again.");
                    errOtp.classList.add('show');
                    btn.disabled          = false;
                    text.textContent      = 'VERIFY';
                    spinner.style.display = 'none';
                }
            } catch (err) {
                showToast(prettyBackendError(err.message || "Server error. Is the backend running?"));
                btn.disabled          = false;
                text.textContent      = 'VERIFY';
                spinner.style.display = 'none';
            }
        }

        async function resendOtp() {
            const btn = document.getElementById('resendBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            try {
                const res = await fetch(API_URLS.startLogin, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: JSON.stringify({
                        username: document.getElementById('loginusername').value.trim(),
                        password: document.getElementById('loginpassword').value.trim(),
                        email: currentEmail,
                        vehicle_id: VEHICLE_ID
                    })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    showToast('New OTP sent');
                } else {
                    showToast(prettyBackendError(data.message || "Failed to resend OTP."));
                }
            } catch (err) {
                showToast(prettyBackendError(err.message || "Failed to resend. Try again."));
            }
            let secs = 30;
            const interval = setInterval(() => {
                btn.textContent = `Resend in ${secs}s`;
                secs--;
                if (secs < 0) {
                    clearInterval(interval);
                    btn.textContent = 'Resend OTP';
                    btn.disabled = false;
                }
            }, 1000);
        }

        function goBack() {
            document.getElementById('otpStep').classList.remove('active');
            document.getElementById('loginStep').classList.remove('hidden');
        }
    </script>
</body>
</html>
