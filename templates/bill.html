<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Bill - DriveGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
        :root { --primary: #0ea5e9; --bg: #f0f9ff; --glass: rgba(255, 255, 255, 0.4); --border: rgba(255, 255, 255, 0.5); --text-main: #0f172a; --text-muted: #475569; }
        body { 
            background-color: var(--bg); 
            background-image: 
                radial-gradient(at 0% 0%, hsla(199, 89%, 84%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(187, 92%, 90%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(217, 91%, 95%, 1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(199, 89%, 84%, 1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, hsla(210, 100%, 98%, 1) 0px, transparent 50%);
            color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px 20px; display: flex; justify-content: center; 
        }
        .container { max-width: 600px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .section-title { font-size: 18px; font-weight: 800; color: var(--text-main); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        .input-box { background: rgba(255, 255, 255, 0.5); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; color: var(--text-main); width: 100%; box-sizing: border-box; outline: none; transition: 0.3s; }
        .input-box::placeholder { color: var(--text-muted); }
        .input-box:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(14,165,233,0.2); background: rgba(255, 255, 255, 0.8); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .data-text { color: var(--primary); font-weight: 600; font-size: 15px; }

        .total-rent-box { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.7); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid var(--primary); box-shadow: inset 0 0 10px rgba(14,165,233,0.1); }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; box-shadow: 0 4px 15px rgba(14,165,233,0.3); }
        .btn-blue:hover { background: #0284c7; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(14,165,233,0.4); }
        .btn-outline { background: rgba(255, 255, 255, 0.5); border: 2px solid var(--primary); color: var(--primary); box-shadow: none; }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.8); color: #0284c7; border-color: #0284c7; transform: translateY(-2px); }
        
        @media print { .btn-blue, .btn-outline { display: none; } body { padding: 0; } .glass-panel { border: none; box-shadow: none; } }
    </style>
</head>
<body>

<div class="container" id="billContent">
    <div class="glass-panel">
        <div class="section-title">Personal Details</div>
        <input type="text" class="input-box" placeholder="Full Name" value="{{ request.user.get_full_name }}">
        <div class="grid-2">
            <input type="email" class="input-box" placeholder="Email" value="{{ request.user.email }}">
            <input type="text" class="input-box" placeholder="Phone Number">
        </div>

        <div class="section-title" style="margin-top:20px">Rental Details</div>
        <div class="grid-2">
            <div><span class="label">Vehicle</span><div class="data-text">{{ vehicle_name }}</div></div>
            <div><span class="label">Color</span><div class="data-text">Premium Blue</div></div>
        </div>
        <div class="grid-2" style="margin-top:15px">
            <div><span class="label">Number of Days</span><div class="data-text">{{ total_days }} Days</div></div>
            <div><span class="label">Pickup Date</span><div class="data-text">{{ pickup_date }}</div></div>
        </div>
        <div style="margin-top:15px">
            <span class="label">Pickup Location</span>
            <div class="data-text">{{ location }}</div>
        </div>

        <div class="total-rent-box">
            <span style="font-weight:800; font-size:18px">Total Rent:</span>
            <span style="font-weight:900; font-size:24px; color:var(--primary)">₹{{ total_rent }}</span>
        </div>
    </div>

    <button class="btn-blue btn-outline" onclick="window.print()">Display Bill (Download PDF)</button>
    
    <form action="/confirm_booking_to_db/" method="POST">
        {% csrf_token %}
        <input type="hidden" name="final_data" id="final_data_input" value="{{ vehicle_name }}|{{ total_rent }}">
        <button type="submit" class="btn-blue">Confirm Booking</button>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        
        let car = urlParams.get('car');
        let days = urlParams.get('days');
        let total = urlParams.get('total');
        
        // If not in URL, check localStorage
        if (!car || !total) {
            const stored = localStorage.getItem('tempBookingDetails');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    car = data.vehicleName;
                    days = data.durationDays;
                    total = data.totalAmount;
                } catch(e) {}
            }
        }
        
        // If we found data, update the DOM
        if (car && total) {
            const dataTexts = document.querySelectorAll('.data-text');
            if (dataTexts.length >= 3) {
                dataTexts[0].textContent = car;
                dataTexts[2].textContent = days + " Days";
            }
            
            const totalRentEl = document.querySelector('.total-rent-box span:last-child');
            if (totalRentEl) {
                totalRentEl.textContent = "₹" + total;
            }
            
            const finalDataInput = document.getElementById('final_data_input');
            if (finalDataInput) {
                finalDataInput.value = car + "|" + total;
            }
        }
    });
</script>
</body>
</html>
