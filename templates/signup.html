<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - DriveGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #0ea5e9;
            --card-bg: rgba(255,255,255,0.60);
            --input-bg: rgba(255,255,255,0.7);
            --text: #1e293b;
            --muted: #64748b;
            --font: 'Inter', sans-serif;
        }
        html, body { min-height: 100%; color: var(--text); font-family: var(--font); overflow-x: hidden; }
        body {
            background-color: #f0f9ff;
            background-image:
                radial-gradient(at 0% 0%, hsla(199,89%,84%,1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(187,92%,90%,1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(217,91%,95%,1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(199,89%,84%,1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, hsla(210,100%,98%,1) 0px, transparent 50%);
            display: flex; align-items: center; justify-content: center;
            padding: 40px 20px; position: relative;
        }
        body::before { content:''; position:fixed; width:500px; height:500px; border-radius:50%; filter:blur(80px); z-index:0; opacity:0.45; top:-10%; left:-10%; background:#bae6fd; pointer-events:none; }
        body::after  { content:''; position:fixed; width:500px; height:500px; border-radius:50%; filter:blur(80px); z-index:0; opacity:0.4;  bottom:-10%; right:-10%; background:#7dd3fc; pointer-events:none; }
        .material-symbols-outlined { font-variation-settings:'FILL' 1,'wght' 300,'GRAD' 0,'opsz' 24; line-height:1; vertical-align:middle; }
        .glass-card {
            background: rgba(255,255,255,0.62);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.78);
            border-top: 1.5px solid rgba(255,255,255,0.92);
            border-left: 1.5px solid rgba(255,255,255,0.92);
            border-radius: 32px;
            padding: 40px 36px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 60px rgba(14,165,233,0.12), 0 8px 20px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
            position: relative;
            z-index: 10;
            animation: fadeUp 0.6s ease-out both;
        }
        .avatar-circle {
            width:90px; height:90px; border-radius:50%; border:2px solid var(--primary);
            display:flex; align-items:center; justify-content:center; margin:0 auto 24px auto;
            box-shadow:0 0 25px rgba(14,165,233,0.3), inset 0 0 15px rgba(14,165,233,0.1);
            background:rgba(14,165,233,0.07);
        }
        .avatar-circle .material-symbols-outlined { font-size:2.5rem; color:var(--primary); font-variation-settings:'FILL' 0; }
        .form-fields { display:flex; flex-direction:column; gap:14px; }
        .input-wrap { position:relative; }
        .input-wrap .material-symbols-outlined { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:#0ea5e9; font-size:1.2rem; pointer-events:none; opacity:0.75; }
        .input-wrap input { width:100%; background:rgba(255,255,255,0.72); border:1.5px solid rgba(14,165,233,0.22); color:#1e293b; font-family:var(--font); font-size:0.95rem; border-radius:12px; padding:14px 16px 14px 50px; outline:none; transition:all 0.3s; }
        .input-wrap input::placeholder { color:#94a3b8; }
        .input-wrap input:focus { box-shadow:0 0 0 2px rgba(14,165,233,0.35); background:rgba(255,255,255,0.92); border-color:var(--primary); }
        .signup-btn { width:100%; background:linear-gradient(135deg,#0ea5e9,#0284c7); color:#fff; border:none; border-radius:12px; padding:16px; font-family:var(--font); font-size:1rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; justify-content:center; margin-top:14px; box-shadow:0 6px 20px rgba(14,165,233,0.35); }
        .signup-btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(14,165,233,0.5); }
        .signup-btn:active { transform:scale(0.98); }
        .divider { display:flex; align-items:center; gap:12px; color:#94a3b8; font-size:0.78rem; margin:24px 0 16px; }
        .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(14,165,233,0.2); }
        .login-row { text-align:center; font-size:0.88rem; color:#64748b; }
        .login-row a { color:var(--primary); font-weight:600; text-decoration:none; transition:color 0.2s; }
        .login-row a:hover { color:#0284c7; }
        .home-btn { background:none; border:none; color:#94a3b8; font-family:var(--font); font-size:0.85rem; cursor:pointer; display:flex; align-items:center; gap:4px; position:absolute; top:24px; left:24px; transition:color 0.2s; text-decoration:none; }
        .home-btn:hover { color:#0ea5e9; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        /* ── DARK MODE ── */
        [data-theme="dark"] body { background-color:#0f172a !important; background-image:none !important; }
        [data-theme="dark"] body::before { background:radial-gradient(circle at 20% 20%, rgba(14,165,233,0.18) 0%, transparent 55%) !important; filter:none !important; }
        [data-theme="dark"] body::after  { background:radial-gradient(circle at 80% 80%, rgba(30,58,138,0.4) 0%, transparent 55%) !important; filter:none !important; }
        [data-theme="dark"] .glass-card { background:rgba(15,23,42,0.85) !important; border-color:rgba(14,165,233,0.3) !important; box-shadow:0 25px 60px rgba(0,0,0,0.55), 0 0 40px rgba(14,165,233,0.08), inset 0 1px 0 rgba(255,255,255,0.05) !important; }
        [data-theme="dark"] .input-wrap input { background:rgba(2,44,94,0.6) !important; border-color:rgba(14,165,233,0.2) !important; color:#e2e8f0 !important; }
        [data-theme="dark"] .input-wrap input:focus { background:rgba(2,44,94,0.85) !important; border-color:var(--primary) !important; }
        [data-theme="dark"] .input-wrap input::placeholder { color:#475569 !important; }
        [data-theme="dark"] .input-wrap .material-symbols-outlined { color:#38bdf8 !important; }
        [data-theme="dark"] .login-row { color:#94a3b8 !important; }
        [data-theme="dark"] .home-btn { color:#64748b !important; }
        [data-theme="dark"] .home-btn:hover { color:#38bdf8 !important; }
        [data-theme="dark"] .divider { color:#475569 !important; }
        [data-theme="dark"] .divider::before,[data-theme="dark"] .divider::after { background:rgba(71,85,105,0.5) !important; }
    </style>
<script>
/* DriveGO Global Theme System */
(function(){
    var t = localStorage.getItem('drivego_theme') || 'light';
    var resolved = (t === 'system') ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : t;
    document.documentElement.setAttribute('data-theme', resolved);
})();
</script>
<style>
/* === DriveGO Global Dark Mode === */
[data-theme="dark"] body,
[data-theme="dark"] .bg-main-mesh {
    background-color: #0f172a !important;
    background-image: none !important;
    color: #e2e8f0 !important;
}
[data-theme="dark"] body::before {
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%) !important;
}
[data-theme="dark"] body::after { background: none !important; }
[data-theme="dark"] .glass-panel,
[data-theme="dark"] [class*="bg-white/4"],
[data-theme="dark"] [class*="bg-white/5"],
[data-theme="dark"] [class*="bg-white/6"],
[data-theme="dark"] [class*="bg-white/3"] {
    background: rgba(30,41,59,0.88) !important;
    border-color: rgba(71,85,105,0.45) !important;
}
[data-theme="dark"] h1,[data-theme="dark"] h2,[data-theme="dark"] h3 { color: #f1f5f9 !important; }
[data-theme="dark"] p,[data-theme="dark"] span:not([class*="text-sky"]):not([class*="text-emerald"]):not([class*="text-red"]):not([class*="text-amber"]):not([class*="text-yellow"]) { color: inherit; }
[data-theme="dark"] .text-slate-900 { color: #f1f5f9 !important; }
[data-theme="dark"] .text-slate-800 { color: #e2e8f0 !important; }
[data-theme="dark"] .text-slate-700 { color: #cbd5e1 !important; }
[data-theme="dark"] .text-slate-600 { color: #94a3b8 !important; }
[data-theme="dark"] .text-slate-500 { color: #64748b !important; }
[data-theme="dark"] [class*="border-white/"] { border-color: rgba(71,85,105,0.4) !important; }
[data-theme="dark"] input:not([type="submit"]):not([type="button"]),
[data-theme="dark"] .input-box,
[data-theme="dark"] select,
[data-theme="dark"] textarea {
    background: rgba(15,23,42,0.75) !important;
    color: #e2e8f0 !important;
    border-color: rgba(71,85,105,0.6) !important;
}
[data-theme="dark"] input::placeholder,
[data-theme="dark"] textarea::placeholder { color: #475569 !important; }
[data-theme="dark"] header { background: rgba(15,23,42,0.92) !important; border-color: rgba(71,85,105,0.3) !important; }
[data-theme="dark"] nav { background: rgba(15,23,42,0.9) !important; }
[data-theme="dark"] .glass-nav,
[data-theme="dark"] #nav-container { background: rgba(15,23,42,0.92) !important; border-color: rgba(71,85,105,0.3) !important; }
[data-theme="dark"] label { color: #cbd5e1 !important; }
[data-theme="dark"] .bg-white { background: #1e293b !important; }
[data-theme="dark"] .bg-sky-50 { background: rgba(14,165,233,0.1) !important; }
[data-theme="dark"] .bg-slate-100,
[data-theme="dark"] .bg-slate-200 { background: rgba(30,41,59,0.7) !important; }
[data-theme="dark"] :root {
    --bg: #0f172a;
    --glass: linear-gradient(135deg, rgba(30,41,59,0.88), rgba(15,23,42,0.75));
    --border: rgba(71,85,105,0.45);
    --border-highlight: rgba(100,116,139,0.6);
    --card-bg: rgba(30,41,59,0.8);
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
}
</style>
</head>
<body>

    <div class="glass-card">
        <a href="{% url 'index' %}" class="home-btn" aria-label="Go to Home">
            <span class="material-symbols-outlined" style="font-size: 1.2rem;">home</span>
        </a>

        <div class="avatar-circle">
            <span class="material-symbols-outlined">person_add</span>
        </div>

        <form method="post" action="{% url 'signup' %}" id="signupForm">
            {% csrf_token %}
            <div class="form-fields">
                <div class="input-wrap">
                    <span class="material-symbols-outlined">badge</span>
                    <input type="text" name="name" placeholder="Full Name" required />
                </div>
                
                <div class="input-wrap">
                    <span class="material-symbols-outlined">account_circle</span>
                    <input type="text" name="username" placeholder="Username" required />
                </div>
                
                <div class="input-wrap">
                    <span class="material-symbols-outlined">email</span>
                    <input type="email" name="email" placeholder="Email Address" required />
                </div>
                
                <div class="input-wrap">
                    <span class="material-symbols-outlined">call</span>
                    <input type="tel" name="number" placeholder="Phone Number" />
                </div>

                <div class="input-wrap">
                    <span class="material-symbols-outlined">lock</span>
                    <input type="password" id="password" name="password" placeholder="Password" required />
                </div>

                <div class="input-wrap">
                    <span class="material-symbols-outlined">lock_reset</span>
                    <input type="password" id="confirmPassword" name="password2" placeholder="Confirm Password" required />
                </div>
                
                <button type="submit" class="signup-btn">
                    SIGN UP
                </button>
            </div>
        </form>
        
        <div class="divider">or</div>
        <div class="login-row">Already have an account? <a href="{% url 'Login' %}">Log In</a></div>
    </div>

    <script>
        document.getElementById("signupForm").addEventListener("submit", function (e) {
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                e.preventDefault();
                alert("❌ Passwords do not match!");
            }
        });
    </script>
</body>
</html>
