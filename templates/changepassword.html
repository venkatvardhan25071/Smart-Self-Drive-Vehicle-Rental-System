<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Change Password - DriveGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script>
        /* Apply theme before render */
        (function(){
            var t = localStorage.getItem('drivego_theme') || 'light';
            var r = (t === 'system') ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : t;
            document.documentElement.setAttribute('data-theme', r);
        })();
    </script>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-glow: rgba(14, 165, 233, 0.4);
            --bg: #dcf1ff;
            --glass: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.3));
            --border: rgba(255,255,255,0.6);
            --border-highlight: rgba(255,255,255,1);
            --card-bg: rgba(255,255,255,0.5);
            --text-main: #0f172a;
            --text-muted: #475569;
        }

        body {
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #bae6fd 0%, #e0f2fe 100%);
            z-index: -1;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(circle at 15% 30%, rgba(255,255,255,0.6) 0%, transparent 40%),
                radial-gradient(circle at 85% 20%, rgba(125,211,252,0.4) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 50%),
                radial-gradient(circle at 10% 90%, rgba(14,165,233,0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255,255,255,0.6) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        /* Dark Mode */
        [data-theme="dark"] { --glass: linear-gradient(135deg,rgba(30,41,59,0.88),rgba(15,23,42,0.75)); --border: rgba(71,85,105,0.45); --border-highlight: rgba(100,116,139,0.6); --card-bg: rgba(30,41,59,0.8); --text-main: #f1f5f9; --text-muted: #94a3b8; }
        [data-theme="dark"] body { background-color: #0f172a !important; color: #f1f5f9 !important; }
        [data-theme="dark"] body::before { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%) !important; }
        [data-theme="dark"] body::after { background: none !important; }
        [data-theme="dark"] input { background: rgba(15,23,42,0.7) !important; color: #e2e8f0 !important; border-color: rgba(71,85,105,0.6) !important; }
        [data-theme="dark"] input::placeholder { color: #475569 !important; }
        [data-theme="dark"] h3 { color: #f1f5f9 !important; }

        .container { max-width: 680px; width: 100%; display: flex; flex-direction: column; gap: 20px; position: relative; z-index: 1; margin-bottom: 30px; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-top: 1.5px solid var(--border-highlight);
            border-left: 1.5px solid var(--border-highlight);
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-25deg);
            animation: shine 8s infinite;
            pointer-events: none;
        }
        @keyframes shine { 0% { left: -150%; } 20% { left: 200%; } 100% { left: 200%; } }

        .step-indicator { background: linear-gradient(135deg, var(--primary), #3b82f6); width: 28px; height: 28px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; color: white; font-size: 14px; margin-right: 12px; box-shadow: 0 4px 10px rgba(14,165,233,0.4); border: 1px solid rgba(255,255,255,0.3); flex-shrink: 0; }

        h3 { margin: 0 0 18px 0; font-size: 17px; font-weight: 700; display: flex; align-items: center; color: var(--text-main); }

        .input-box {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            color: var(--text-main);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .input-box::placeholder { color: var(--text-muted); }
        .input-box:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); transform: translateY(-2px); background: rgba(255,255,255,0.8); }

        .btn-save {
            width: 100%;
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 18px;
            border-radius: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s;
            font-size: 15px;
            font-family: inherit;
            box-shadow: 0 8px 25px rgba(14,165,233,0.4);
            letter-spacing: 0.5px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(14,165,233,0.6); filter: brightness(1.1); }
        .btn-save:active { transform: translateY(0); }
        .btn-save:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; background: #94a3b8; }
        
        .btn-secondary {
            width: 100%;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            font-size: 14px;
            font-family: inherit;
            backdrop-filter: blur(10px);
            text-align: center; text-decoration: none; display: block;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); color: var(--primary); }

        /* Back button */
        .back-row { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
        .back-btn { background: var(--glass); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; text-decoration: none; transition: 0.3s; backdrop-filter: blur(10px); }
        .back-btn:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 12px var(--primary-glow); }

        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Message area */
        .message-area { padding: 12px 16px; border-radius: 12px; font-weight: 600; font-size: 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .msg-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .msg-success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }

        /* Spinner */
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <!-- Back + Title -->
    <div class="back-row">
        <a href="{% url 'settings' %}" class="back-btn">
            <span class="material-symbols-outlined" style="font-size:20px;">arrow_back_ios_new</span>
        </a>
        <h2 style="margin:0; font-size:26px; font-weight:800; color:var(--text-main);">Change Password</h2>
    </div>

    {% if messages %}
    <div>
        {% for message in messages %}
        <div class="message-area {% if message.tags == 'error' %}msg-error{% else %}msg-success{% endif %}">
            <span class="material-symbols-outlined">info</span>
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form id="changePasswordForm" method="POST" action="{% url 'changepassword' %}">
        {% csrf_token %}

        <div class="glass-panel">
            <h3><span class="step-indicator">🔒</span> Security Update</h3>
            <div style="display:flex; flex-direction:column; gap:16px;">
                <div>
                    <label for="current-password" style="display:block; margin-bottom:6px; font-size:13px; font-weight:600; color:var(--text-muted); padding-left:4px;">Current Password</label>
                    <input type="password" id="current-password" name="current-password" required class="input-box" placeholder="Enter current password">
                </div>
                <div>
                    <label for="new-password" style="display:block; margin-bottom:6px; font-size:13px; font-weight:600; color:var(--text-muted); padding-left:4px;">New Password</label>
                    <input type="password" id="new-password" name="new-password" required class="input-box" placeholder="Create new password">
                </div>
                <div>
                    <label for="confirm-password" style="display:block; margin-bottom:6px; font-size:13px; font-weight:600; color:var(--text-muted); padding-left:4px;">Confirm New Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required class="input-box" placeholder="Repeat new password">
                    <p id="passwordMatchMessage" style="font-size:12px; margin:6px 0 0 4px; height:16px; font-weight:600;"></p>
                </div>
            </div>
        </div>

        <div class="glass-panel" style="margin-top:20px;">
            <button type="submit" id="savePasswordBtn" class="btn-save" disabled>
                <span id="btn-label">Save Password</span>
                <span id="btn-spinner" class="spinner" style="display:none;"></span>
            </button>
            <a href="{% url 'profile' %}" class="btn-secondary">👤 Edit Profile</a>
        </div>
    </form>
</div>

<script>
    const newPasswordInput = document.getElementById('new-password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const messageElement = document.getElementById('passwordMatchMessage');
    const saveButton = document.getElementById('savePasswordBtn');

    function checkPasswordMatch() {
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (confirmPassword.length > 0) {
            if (newPassword === confirmPassword) {
                messageElement.textContent = "Passwords match!";
                messageElement.style.color = "#10b981"; // Emerald
                saveButton.disabled = false;
            } else {
                messageElement.textContent = "Passwords do not match.";
                messageElement.style.color = "#ef4444"; // Red
                saveButton.disabled = true;
            }
        } else {
            messageElement.textContent = "";
            saveButton.disabled = true;
        }
        
        if (newPassword.length === 0) {
            saveButton.disabled = true;
        }
    }

    newPasswordInput.addEventListener('input', checkPasswordMatch);
    confirmPasswordInput.addEventListener('input', checkPasswordMatch);

    document.getElementById('changePasswordForm').addEventListener('submit', function() {
        document.getElementById('btn-label').textContent = 'Saving...';
        document.getElementById('btn-spinner').style.display = 'block';
        saveButton.disabled = true; // prevent double submit
    });
</script>
</body>
</html>
