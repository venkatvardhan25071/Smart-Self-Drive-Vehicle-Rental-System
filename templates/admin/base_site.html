{% extends "admin/base.html" %}
{% block title %}{{ title }} | DriveGO Admin{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
/* ═══ DRIVEGO ADMIN — PREMIUM GLASSMORPHIC ═══ */
:root{
  --p:#0052cc;--pg:rgba(0,82,204,.22);--ph:#1d6bf3;
  --sidebar-bg:rgba(255,255,255,.72);--header-bg:rgba(255,255,255,.6);
  --glass:rgba(255,255,255,.55);--gb:rgba(255,255,255,.25);
  --text:#051a3e;--muted:#475569;
  --font:'Inter',sans-serif;--font-h:'Manrope',sans-serif;
}
*,*::before,*::after{box-sizing:border-box}

/* ── BACKGROUND + BUBBLES ── */
html{min-height:100%}
body{
  font-family:var(--font)!important;color:var(--text)!important;
  background:linear-gradient(135deg,#b8d4ff 0%,#d8e8ff 35%,#c2ddf5 65%,#a8c8f0 100%)!important;
  background-attachment:fixed!important;min-height:100vh;position:relative;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 10% 10%,rgba(255,255,255,.55) 0%,transparent 45%),
    radial-gradient(ellipse at 90% 85%,rgba(0,82,204,.12) 0%,transparent 45%),
    radial-gradient(ellipse at 55% 5%,rgba(99,130,246,.1) 0%,transparent 40%)}
/* bubble canvas layer */
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none}
h1,h2,h3,h4,h5,caption{font-family:var(--font-h)!important}
a:link,a:visited{color:var(--p);text-decoration:none;transition:.2s}
a:hover{color:var(--ph)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#c7d8ff;border-radius:4px}

/* ── HEADER ── */
#header{
  background:var(--header-bg)!important;
  backdrop-filter:blur(28px) saturate(180%)!important;
  -webkit-backdrop-filter:blur(28px) saturate(180%)!important;
  border-bottom:1px solid var(--gb)!important;
  box-shadow:0 2px 20px rgba(0,82,204,.1),inset 0 -1px 0 rgba(255,255,255,.8)!important;
  padding:0 28px!important;display:flex!important;align-items:center!important;
  justify-content:space-between!important;position:sticky!important;top:0!important;z-index:999!important}
#branding h1{
  color:var(--p)!important;font-weight:900!important;font-size:20px!important;
  margin:0!important;letter-spacing:-.3px!important;
  display:flex!important;align-items:center!important;gap:8px!important}
#branding h1 a{color:var(--p)!important}
#branding h1::before{
  content:'directions_car';font-family:'Material Symbols Outlined';font-size:22px;
  font-variation-settings:'FILL' 1;color:var(--p)}
#user-tools{font-size:13px!important;color:var(--muted)!important}
#user-tools a{
  background:rgba(0,82,204,.1);border:1px solid rgba(0,82,204,.2);
  color:var(--p)!important;border-radius:20px;padding:4px 14px;font-weight:700;transition:.2s}
#user-tools a:hover{background:var(--p);color:#fff!important;box-shadow:0 0 14px var(--pg)}

/* ── NAV SIDEBAR ── */
#nav-sidebar{
  background:var(--sidebar-bg)!important;
  backdrop-filter:blur(36px) saturate(160%)!important;
  -webkit-backdrop-filter:blur(36px) saturate(160%)!important;
  border-right:1px solid var(--gb)!important;
  box-shadow:4px 0 24px rgba(0,82,204,.08)!important}
#nav-sidebar input[type=text]{
  background:rgba(255,255,255,.6)!important;border:1px solid var(--gb)!important;
  border-radius:10px!important;color:var(--text)!important;font-size:13px!important}
#nav-sidebar th a,#nav-sidebar .model-name a{
  border-radius:10px!important;color:var(--muted)!important;
  font-size:13.5px!important;font-weight:600!important;transition:all .22s!important;
  padding:8px 12px!important}
#nav-sidebar th a:hover,#nav-sidebar .model-name a:hover{
  background:rgba(255,255,255,.55)!important;color:var(--p)!important;
  box-shadow:0 2px 10px rgba(0,82,204,.12)!important}
#nav-sidebar .model-name.selected a,#nav-sidebar tr.model-row.selected a{
  background:rgba(0,82,204,.1)!important;color:var(--p)!important;
  font-weight:700!important;box-shadow:inset 3px 0 0 var(--p)!important}
#nav-sidebar caption{
  font-size:10px!important;font-weight:800!important;color:var(--muted)!important;
  letter-spacing:.1em;text-transform:uppercase;background:transparent!important;border:none!important}

/* ── CONTENT ── */
#content-main,.content-main{position:relative;z-index:1}
.breadcrumbs{
  background:rgba(255,255,255,.45)!important;backdrop-filter:blur(12px)!important;
  border:none!important;border-bottom:1px solid var(--gb)!important;
  padding:10px 24px!important;color:var(--muted)!important;font-size:13px!important}
.breadcrumbs a{color:var(--p)!important}
#content{padding:24px 28px!important;position:relative;z-index:1}

/* ── MODULES ── */
.module{
  background:var(--glass)!important;backdrop-filter:blur(22px) saturate(150%)!important;
  -webkit-backdrop-filter:blur(22px) saturate(150%)!important;
  border:1px solid var(--gb)!important;
  border-top-color:rgba(255,255,255,.75)!important;
  border-left-color:rgba(255,255,255,.75)!important;
  border-radius:18px!important;overflow:hidden!important;
  box-shadow:0 8px 32px rgba(0,82,204,.07),inset 0 1px 0 rgba(255,255,255,.9)!important;
  margin-bottom:22px!important;transition:all .3s!important}
.module:hover{
  box-shadow:0 12px 40px rgba(0,82,204,.14),0 0 0 1px rgba(0,82,204,.12),inset 0 1px 0 rgba(255,255,255,.9)!important;
  transform:translateY(-1px)!important}
.module>h2,.module>table>caption{
  background:rgba(255,255,255,.55)!important;border-bottom:1px solid var(--gb)!important;
  color:var(--text)!important;font-size:14px!important;font-weight:700!important;
  padding:14px 20px!important;letter-spacing:-.1px}

/* ── TABLES ── */
table{width:100%;border-collapse:collapse}
thead th{
  background:rgba(255,255,255,.45)!important;color:var(--muted)!important;
  font-size:11px!important;font-weight:700!important;text-transform:uppercase;
  letter-spacing:.07em;padding:12px 16px!important;border-bottom:1px solid var(--gb)!important}
thead th a{color:var(--muted)!important}
thead th a:hover{color:var(--p)!important}
tbody td,tbody th{
  padding:13px 16px!important;color:var(--text)!important;font-size:13.5px!important;
  border-bottom:1px solid rgba(255,255,255,.4)!important;vertical-align:middle!important}
tbody td a{color:var(--p)!important}
tbody tr:hover td,tbody tr:hover th{
  background:rgba(255,255,255,.55)!important;transition:background .18s!important}
.row1{background:rgba(255,255,255,.28)!important}
.row2{background:transparent!important}

/* ── BUTTONS ── */
.button,input[type=submit],input[type=button],.submit-row input,a.button{
  font-family:var(--font-h)!important;font-weight:800!important;font-size:13px!important;
  border:none!important;border-radius:20px!important;padding:9px 22px!important;
  cursor:pointer!important;letter-spacing:.03em!important;
  color:#fff!important;
  transition:transform .18s ease, box-shadow .18s ease, filter .18s ease !important;
}
/* Primary / Save */
.default,input[type=submit]{
  background:linear-gradient(135deg,#0052cc,#1d6bf3)!important;
  color:#fff!important;
  box-shadow:0 3px 12px rgba(0,82,204,.38)!important;
}
.default:hover,input[type=submit]:hover{
  transform:scale(1.06)!important;
  filter:brightness(1.12)!important;
  box-shadow:0 0 22px rgba(0,82,204,.58)!important;
  color:#fff!important;
}
/* Save and add another / Save and continue */
.submit-row input[name="_addanother"],
.submit-row input[name="_continue"]{
  background:linear-gradient(135deg,#0891b2,#0e7490)!important;
  color:#fff!important;
  box-shadow:0 3px 12px rgba(8,145,178,.38)!important;
}
.submit-row input[name="_addanother"]:hover,
.submit-row input[name="_continue"]:hover{
  transform:scale(1.06)!important;
  filter:brightness(1.12)!important;
  box-shadow:0 0 22px rgba(8,145,178,.55)!important;
}
/* Delete */
.deletelink,a.deletelink{
  background:linear-gradient(135deg,#ef4444,#dc2626)!important;
  color:#fff!important;
  border-radius:20px!important;padding:9px 22px!important;
  font-weight:800!important;font-size:13px!important;
  box-shadow:0 3px 12px rgba(239,68,68,.35)!important;
  transition:transform .18s ease, box-shadow .18s ease, filter .18s ease !important;
  display:inline-block!important;
}
.deletelink:hover,a.deletelink:hover{
  transform:scale(1.06)!important;
  filter:brightness(1.12)!important;
  box-shadow:0 0 22px rgba(239,68,68,.58)!important;
  color:#fff!important;
}
/* Add link */
.addlink{
  background:linear-gradient(135deg,#0052cc,#1d6bf3)!important;
  color:#fff!important;
  border:none!important;border-radius:20px!important;
  padding:6px 16px!important;font-weight:800!important;
  font-size:12px!important;display:inline-block!important;
  box-shadow:0 3px 10px rgba(0,82,204,.3)!important;
  transition:transform .18s ease, box-shadow .18s ease, filter .18s ease !important;
}
.addlink:hover{
  transform:scale(1.07)!important;
  filter:brightness(1.12)!important;
  box-shadow:0 0 18px rgba(0,82,204,.55)!important;
  color:#fff!important;
}
/* Generic fallback .button */
.button:not(.default):not(.deletelink):not(.addlink){
  background:linear-gradient(135deg,#6366f1,#4f46e5)!important;
  color:#fff!important;
  box-shadow:0 3px 12px rgba(99,102,241,.35)!important;
}
.button:not(.default):not(.deletelink):not(.addlink):hover{
  transform:scale(1.06)!important;
  filter:brightness(1.12)!important;
  box-shadow:0 0 20px rgba(99,102,241,.55)!important;
}

/* ── INPUTS ── */
input[type=text],input[type=password],input[type=email],input[type=search],
input[type=url],input[type=number],select,textarea{
  background:rgba(255,255,255,.6)!important;border:1px solid var(--gb)!important;
  color:var(--text)!important;border-radius:12px!important;
  padding:9px 14px!important;font-family:var(--font)!important;
  font-size:13px!important;outline:none!important;transition:all .2s!important}
input:focus,select:focus,textarea:focus{
  border-color:var(--p)!important;background:rgba(255,255,255,.88)!important;
  box-shadow:0 0 0 3px rgba(0,82,204,.15)!important}
label{color:var(--muted)!important;font-size:13px!important;font-weight:600!important}
#searchbar{border-radius:30px!important;width:260px!important}
#searchbar:focus{width:300px!important;border-color:var(--p)!important}

/* ── FILTERS (right panel) ── */
#changelist-filter{
  background:rgba(255,255,255,.6)!important;backdrop-filter:blur(20px)!important;
  border:none!important;border-left:1px solid var(--gb)!important;min-width:180px}
#changelist-filter h2{
  font-size:10px!important;font-weight:800!important;color:var(--p)!important;
  text-transform:uppercase;letter-spacing:.12em;background:rgba(0,82,204,.08)!important;
  border-bottom:1px solid var(--gb)!important;padding:12px 16px!important;
  margin:0!important;border-radius:0!important}
#changelist-filter h3{font-size:12px!important;font-weight:700!important;
  color:var(--muted)!important;padding:10px 16px 4px!important;margin:0!important}
#changelist-filter ul{padding:0 12px 10px!important;margin:0!important}
#changelist-filter li{list-style:none!important}
#changelist-filter li a{
  font-size:13px!important;color:var(--muted)!important;display:block;
  padding:5px 8px!important;border-radius:8px!important;transition:.2s!important}
#changelist-filter li a:hover{background:rgba(0,82,204,.08)!important;color:var(--p)!important}
#changelist-filter li.selected a{color:var(--p)!important;font-weight:700!important;
  background:rgba(0,82,204,.1)!important;border-radius:8px}

/* ── SUBMIT ROW ── */
.submit-row{
  background:rgba(255,255,255,.45)!important;backdrop-filter:blur(12px)!important;
  border-top:1px solid var(--gb)!important;padding:16px 20px!important;
  display:flex!important;gap:10px!important;align-items:center!important;flex-wrap:wrap!important}

/* ── OBJECT TOOLS ── */
.object-tools{margin-bottom:16px!important}
.object-tools a{
  background:rgba(0,82,204,.1)!important;border:1px solid rgba(0,82,204,.2)!important;
  color:var(--p)!important;border-radius:20px!important;padding:7px 16px!important;
  font-size:12.5px!important;font-weight:700!important;transition:all .2s!important}
.object-tools a:hover{background:var(--p)!important;color:#fff!important;box-shadow:0 0 14px var(--pg)!important}

/* ── MESSAGES ── */
.messagelist{padding:0!important;margin:0 0 16px!important}
.messagelist li{
  background:rgba(0,82,204,.07)!important;border:1px solid rgba(0,82,204,.14)!important;
  border-left:4px solid var(--p)!important;border-radius:12px!important;
  color:var(--text)!important;padding:12px 18px!important;margin-bottom:8px!important;
  font-size:14px!important;list-style:none!important}
.messagelist .success{border-left-color:#10b981!important;background:rgba(16,185,129,.07)!important}
.messagelist .error{border-left-color:#ef4444!important;background:rgba(239,68,68,.07)!important}

/* ── PAGINATION ── */
.paginator{
  background:rgba(255,255,255,.38)!important;border-top:1px solid var(--gb)!important;
  padding:12px 20px!important;color:var(--muted)!important;font-size:13px!important}
.paginator a,.paginator .this-page{
  background:rgba(255,255,255,.55)!important;border:1px solid var(--gb)!important;
  border-radius:8px!important;padding:5px 12px!important;margin:0 3px!important;display:inline-block}
.paginator a:hover{background:rgba(0,82,204,.12)!important;color:var(--p)!important;border-color:var(--p)!important}
.paginator .this-page{
  background:linear-gradient(135deg,#0052cc,#1d6bf3)!important;color:#fff!important;
  border:none!important;font-weight:700!important}

/* ── ACTION TOOLBAR ── */
#changelist #toolbar{
  background:transparent!important;border:none!important;padding:0 0 16px!important}
.actions{
  background:rgba(255,255,255,.45)!important;border:1px solid var(--gb)!important;
  border-radius:12px!important;padding:10px 16px!important;margin:12px 0!important;
  backdrop-filter:blur(12px)!important}
.actions label,.actions select{
  border-radius:10px!important;font-size:13px!important}

/* ── LOGIN ── */
.login #content-main{
  background:rgba(255,255,255,.65)!important;backdrop-filter:blur(32px)!important;
  border:1px solid var(--gb)!important;border-radius:24px!important;padding:40px!important;
  box-shadow:0 20px 60px rgba(0,82,204,.18)!important}

/* ── INLINE GROUPS ── */
.inline-group{background:rgba(255,255,255,.38)!important;border:1px solid var(--gb)!important;
  border-radius:14px!important;overflow:hidden!important;margin:16px 0!important}

/* ── HELP TEXT ── */
.help{color:var(--muted)!important;font-size:12px!important}

/* ── FIELDSET ── */
fieldset{border:1px solid var(--gb)!important;border-radius:14px!important;
  background:rgba(255,255,255,.35)!important;padding:16px 20px!important;margin:12px 0!important}
fieldset h2{color:var(--text)!important;font-size:14px!important;font-weight:700!important}

/* ── BUBBLES ── */
.dg-bubble{
  position:fixed;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.55),rgba(0,82,204,.04));
  border:1px solid rgba(255,255,255,.5);
  backdrop-filter:blur(2px);animation:bubble-float linear infinite;z-index:0}
@keyframes bubble-float{
  0%{transform:translateY(100vh) translateX(0) scale(1);opacity:0}
  5%{opacity:1}
  95%{opacity:.6}
  100%{transform:translateY(-120px) translateX(var(--drift)) scale(var(--grow));opacity:0}}

/* Shine on modules */
@keyframes shine{0%{left:-150%}20%{left:200%}100%{left:200%}}
.module{position:relative;overflow:hidden!important}
.module::after{
  content:'';position:absolute;top:0;left:-150%;width:50%;height:100%;
  background:linear-gradient(to right,transparent,rgba(255,255,255,.25),transparent);
  transform:skewX(-25deg);animation:shine 10s infinite;pointer-events:none}

/* Pulse glow on active nav item */
@keyframes pulse-glow{
  0%,100%{box-shadow:inset 3px 0 0 var(--p)}
  50%{box-shadow:inset 3px 0 0 var(--p),0 0 10px rgba(0,82,204,.25)}}
#nav-sidebar .model-name.selected a{animation:pulse-glow 2.5s ease-in-out infinite!important}

@media(max-width:768px){
  .colMS,.colM{margin-left:0!important}
  .breadcrumbs{margin-left:0!important}
}

/* ══════ ULTIMATE 3D NEON TOGGLE (ADMIN SIDE) ══════ */
.site-toggle-wrapper {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 9999;
  perspective: 1200px;
}
.site-toggle-btn {
  width: 58px;
  height: 58px;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform-style: preserve-3d;
  box-shadow: 
    0 15px 35px rgba(0, 0, 0, 0.3),
    inset 0 0 20px rgba(0, 82, 204, 0.1);
  overflow: hidden;
}
.site-toggle-btn::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: conic-gradient(from 0deg, transparent, rgba(56, 189, 248, 0.3), transparent 60%);
  animation: rotate-neon 4s linear infinite;
  opacity: 0;
  transition: opacity 0.4s ease;
}
@keyframes rotate-neon {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.site-toggle-btn:hover {
  transform: rotateX(-15deg) rotateY(-20deg) scale(1.1);
  border-color: rgba(56, 189, 248, 0.5);
  box-shadow: 
    15px 20px 50px rgba(0, 0, 0, 0.4),
    0 0 30px rgba(56, 189, 248, 0.4),
    inset 0 0 30px rgba(56, 189, 248, 0.2);
}
.site-toggle-btn:hover::before {
  opacity: 1;
}
.site-toggle-btn .material-symbols-outlined {
  font-size: 30px;
  color: #e2e8f0;
  filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.8));
  transition: all 0.5s ease;
  transform: translateZ(30px);
  z-index: 2;
}
.site-toggle-btn:hover .material-symbols-outlined {
  color: #38bdf8;
  transform: translateZ(50px) scale(1.2);
}
.site-toggle-btn:active {
  transform: scale(0.9) translateZ(0);
}

/* Core Glow Pulse */
@keyframes core-pulse-admin {
  0%, 100% { opacity: 0.3; transform: translateZ(10px) scale(1); }
  50% { opacity: 0.6; transform: translateZ(15px) scale(1.1); }
}
.site-toggle-btn .core-glow {
  position: absolute;
  width: 35px;
  height: 35px;
  background: radial-gradient(circle, rgba(56, 189, 248, 0.4) 0%, transparent 70%);
  border-radius: 50%;
  animation: core-pulse-admin 3s ease-in-out infinite;
  z-index: 1;
}

/* Futuristic Cyber Icon (Chip) */
.chip-icon {
  width: 32px;
  height: 32px;
  fill: #e2e8f0;
  filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.8));
  transition: all 0.5s ease;
  transform: translateZ(30px);
  z-index: 2;
}
.site-toggle-btn:hover .chip-icon {
  fill: #38bdf8;
  transform: translateZ(50px) scale(1.2);
}
</style>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  /* ── FLOATING BUBBLES ── */
  const body=document.body;
  const sizes=[40,60,80,100,120,140,55,75,95];
  const count=14;
  for(let i=0;i<count;i++){
    const b=document.createElement('div');
    b.className='dg-bubble';
    const sz=sizes[Math.floor(Math.random()*sizes.length)];
    const dur=12+Math.random()*20;
    const delay=Math.random()*18;
    const left=Math.random()*100;
    const drift=(Math.random()-0.5)*120+'px';
    const grow=0.8+Math.random()*.6;
    b.style.cssText=`
      width:${sz}px;height:${sz}px;
      left:${left}%;bottom:-${sz}px;
      animation-duration:${dur}s;
      animation-delay:-${delay}s;
      --drift:${drift};--grow:${grow};
      opacity:.7`;
    body.appendChild(b);
  }

  /* ── ICON MAP ── */
  const ICONS={
    booking:'calendar_month',vehicle:'directions_car',user:'manage_accounts',
    group:'group',categor:'category',customer:'person_pin',
    host:'home_pin',luxury:'star',order:'shopping_bag',
    parking:'local_parking',rental:'hub',scoot:'moped',
    bike:'pedal_bike',support:'support_agent',ticket:'confirmation_number',
    signal:'sensors',auth:'security',bill:'receipt',payment:'credit_card',
    profile:'account_circle',member:'card_membership',site:'language',session:'timer'
  };
  function getIcon(t){
    const s=t.toLowerCase();
    for(const[k,v]of Object.entries(ICONS))if(s.includes(k))return v;
    return 'dashboard';
  }

  /* Inject icons into sidebar nav */
  document.querySelectorAll('#nav-sidebar th a,#nav-sidebar .model-name a').forEach(a=>{
    if(a.querySelector('.material-symbols-outlined'))return;
    const sp=document.createElement('span');
    sp.className='material-symbols-outlined';
    sp.style.cssText='font-size:16px;font-variation-settings:"FILL" 1;opacity:.65;flex-shrink:0;margin-right:6px;';
    sp.textContent=getIcon(a.textContent);
    a.prepend(sp);
  });

  /* Inject icons into module captions */
  document.querySelectorAll('.module caption,.module h2').forEach(h=>{
    if(h.querySelector('.material-symbols-outlined'))return;
    const sp=document.createElement('span');
    sp.className='material-symbols-outlined';
    sp.style.cssText='font-size:17px;color:var(--p);font-variation-settings:"FILL" 1;vertical-align:middle;margin-right:6px;';
    sp.textContent=getIcon(h.textContent);
    h.insertBefore(sp,h.firstChild);
  });

  /* ── STATUS BADGES ── */
  // Inject badge hover styles once
  if(!document.getElementById('dg-badge-styles')){
    const st=document.createElement('style');
    st.id='dg-badge-styles';
    st.textContent=`
      .dg-badge{
        display:inline-block;border-radius:20px;padding:5px 14px;
        font-size:11px;font-weight:800;letter-spacing:.07em;
        font-family:'Inter',sans-serif;color:#fff!important;
        cursor:default;transition:transform .18s ease,box-shadow .18s ease,filter .18s ease;
        border:none!important;
      }
      .dg-badge:hover{ transform:scale(1.07); filter:brightness(1.12); }
      .dg-accept{ background:linear-gradient(135deg,#10b981,#059669); box-shadow:0 3px 10px rgba(5,150,105,.3); }
      .dg-accept:hover{ box-shadow:0 0 18px rgba(5,150,105,.55); }
      .dg-pending{ background:linear-gradient(135deg,#f59e0b,#d97706); box-shadow:0 3px 10px rgba(245,158,11,.3); }
      .dg-pending:hover{ box-shadow:0 0 18px rgba(245,158,11,.55); }
      .dg-reject{ background:linear-gradient(135deg,#ef4444,#dc2626); box-shadow:0 3px 10px rgba(239,68,68,.3); }
      .dg-reject:hover{ box-shadow:0 0 18px rgba(239,68,68,.55); }
    `;
    document.head.appendChild(st);
  }

  document.querySelectorAll('tbody td').forEach(td=>{
    const t=(td.textContent||'').trim();
    const tl=t.toLowerCase();
    let cls='';
    if(tl==='accepted'||tl==='approved') cls='dg-accept';
    else if(tl==='pending')               cls='dg-pending';
    else if(tl==='rejected'||tl==='reject') cls='dg-reject';
    if(cls){
      td.innerHTML=`<span class="dg-badge ${cls}">${t.toUpperCase()}</span>`;
    }
  });

  /* ── PAGE SUBTITLE ── */
  const h1=document.querySelector('#content h1,#content-main h1');
  if(h1&&!document.querySelector('.dg-sub')){
    const p=document.createElement('p');
    p.className='dg-sub';
    p.style.cssText='color:#64748b;font-size:13px;margin:4px 0 18px;font-family:Inter,sans-serif;';
    p.textContent='DriveGO Management Console — monitor and manage all records';
    h1.insertAdjacentElement('afterend',p);
  }

  /* ── HOVER RIPPLE on table rows ── */
  document.querySelectorAll('tbody tr').forEach(tr=>{
    tr.addEventListener('mouseenter',()=>{tr.style.transition='background .18s';});
  });
});
</script>
