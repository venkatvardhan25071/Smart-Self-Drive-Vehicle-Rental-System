<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venkat – Neon Navbar</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00d4ff;
    --pink: #ff2d78;
    --purple: #9d4edd;
    --violet: #7b2fff;
    --bg: #050a12;
    --glass-bg: rgba(10, 15, 30, 0.6);
    --glass-border: rgba(100, 120, 255, 0.25);
    --text: #e0e8ff;
    --muted: #8892b0;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 48px 24px 80px;
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 60% 40% at 20% 50%, rgba(0,150,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 80% 50%, rgba(180,0,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(120,0,200,0.06) 0%, transparent 60%);
  }

  /* ══════════════════════════════
     NAV WRAPPER – 3D tilt target
  ══════════════════════════════ */
  .nav-scene {
    perspective: 1200px;
    width: 100%;
    max-width: 1080px;
  }

  .navbar {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0;
    padding: 14px 20px;
    border-radius: 20px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out;
    will-change: transform;

    /* outer glow ring */
    box-shadow:
      0 0 0 1px rgba(0,212,255,0.15),
      0 0 30px rgba(0,150,255,0.12),
      0 0 80px rgba(120,0,220,0.10),
      inset 0 1px 0 rgba(255,255,255,0.07);
  }

  /* top / bottom neon border lines */
  .navbar::before,
  .navbar::after {
    content: '';
    position: absolute;
    left: 30px; right: 30px;
    height: 1.5px;
    border-radius: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan) 30%, var(--pink) 70%, transparent);
    opacity: 0.7;
  }
  .navbar::before { top: -1px; }
  .navbar::after  { bottom: -1px; }

  /* ── Blinking dots on border ── */
  .navbar .dot {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan), 0 0 16px var(--cyan);
    animation: blink 2s ease-in-out infinite;
  }
  .navbar .dot.top-left  { top: -3px; left: 25%; background: var(--cyan); }
  .navbar .dot.top-mid   { top: -3px; left: 55%; background: var(--purple); animation-delay: 0.7s; }
  .navbar .dot.top-right { top: -3px; right: 8%; background: var(--pink); animation-delay: 1.4s; }
  .navbar .dot.bot-left  { bottom: -3px; left: 15%; background: var(--violet); animation-delay: 0.4s; }
  .navbar .dot.bot-right { bottom: -3px; right: 25%; background: var(--pink); animation-delay: 1.1s; }

  @keyframes blink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.2; transform: scale(0.6); }
  }

  /* ── Logo ── */
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
    padding-right: 20px;
    border-right: 1px solid rgba(100,120,255,0.2);
    margin-right: 20px;
  }

  .logo-icon {
    width: 34px; height: 34px;
    display: grid; place-items: center;
    position: relative;
  }
  .logo-icon svg { filter: drop-shadow(0 0 6px var(--cyan)); }

  .logo-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Nav links ── */
  .nav-links {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
  }

  .nav-link {
    position: relative;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: var(--muted);
    text-decoration: none;
    border-radius: 10px;
    transition: color 0.3s ease;
    cursor: pointer;
  }

  .nav-link::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    background: rgba(100,120,255,0.0);
    transition: background 0.3s ease;
  }

  .nav-link:hover {
    color: var(--text);
  }
  .nav-link:hover::after {
    background: rgba(100,120,255,0.08);
  }

  /* Active state */
  .nav-link.active {
    color: #fff;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.25);
    box-shadow: 0 0 16px rgba(0,212,255,0.15), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .nav-link.active::before {
    content: '';
    position: absolute;
    bottom: -2px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: blink 1.5s ease-in-out infinite;
  }

  /* ── CTA Button ── */
  .btn-cta {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 12px;
    border: 1px solid rgba(255, 45, 120, 0.5);
    background: rgba(255,45,120,0.05);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    text-decoration: none;
    flex-shrink: 0;
    transition: all 0.3s ease;
    box-shadow: 0 0 20px rgba(255,45,120,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
    margin-left: auto;
  }
  .btn-cta:hover {
    background: rgba(255,45,120,0.15);
    border-color: rgba(255,45,120,0.8);
    box-shadow: 0 0 30px rgba(255,45,120,0.3), 0 0 60px rgba(255,45,120,0.1);
    transform: translateY(-1px);
  }
  .btn-cta .arrow {
    font-size: 16px;
    transition: transform 0.3s ease;
  }
  .btn-cta:hover .arrow { transform: translateX(3px); }

  /* ══════════════════════════════
     FEATURE BADGES
  ══════════════════════════════ */
  .features {
    display: flex;
    gap: 48px;
    margin-top: 56px;
    padding: 32px 40px;
    max-width: 1080px;
    width: 100%;
    border-top: 1px solid rgba(100,120,255,0.1);
    border-bottom: 1px solid rgba(100,120,255,0.1);
    flex-wrap: wrap;
    justify-content: center;
  }

  .feature {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .feature-icon {
    width: 40px; height: 40px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }

  .feature-icon svg {
    width: 28px; height: 28px;
  }

  .feature-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .feature-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 140px;
  }

  .feat-cyan  .feature-label { color: var(--cyan); }
  .feat-violet .feature-label { color: var(--violet); }
  .feat-pink  .feature-label { color: var(--pink); }
  .feat-blue  .feature-label { color: #4fc3f7; }

  /* ══════════════════════════════
     MOBILE MENU
  ══════════════════════════════ */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    border: 1px solid rgba(157,78,221,0.4);
    background: rgba(157,78,221,0.08);
    margin-left: auto;
  }
  .hamburger span {
    display: block;
    width: 20px; height: 2px;
    background: var(--purple);
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  .mobile-menu {
    display: none;
    position: absolute;
    top: calc(100% + 12px);
    left: 0; right: 0;
    background: rgba(8,12,28,0.96);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(157,78,221,0.3);
    border-radius: 16px;
    padding: 12px;
    z-index: 100;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(120,0,220,0.1);
  }

  .mobile-menu.open { display: block; }

  .mobile-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    border-radius: 10px;
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .mobile-link:hover, .mobile-link.active {
    background: rgba(100,120,255,0.08);
    color: #fff;
  }
  .mobile-link svg { width: 18px; height: 18px; opacity: 0.7; }

  .mobile-cta {
    margin-top: 8px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,45,120,0.4);
    background: rgba(255,45,120,0.05);
    color: #fff;
    text-align: center;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s ease;
  }
  .mobile-cta:hover {
    background: rgba(255,45,120,0.12);
    box-shadow: 0 0 20px rgba(255,45,120,0.2);
  }

  /* ══════════════════════════════
     RESPONSIVE
  ══════════════════════════════ */
  @media (max-width: 768px) {
    .nav-links, .btn-cta { display: none; }
    .hamburger { display: flex; }
    .features { gap: 28px; padding: 24px 20px; }
    .feature-desc { max-width: 120px; }
  }
</style>
</head>
<body>

<!-- ══ NAVBAR ══ -->
<div class="nav-scene" id="navScene">
  <nav class="navbar" id="navbar">
    <!-- glow dots -->
    <span class="dot top-left"></span>
    <span class="dot top-mid"></span>
    <span class="dot top-right"></span>
    <span class="dot bot-left"></span>
    <span class="dot bot-right"></span>

    <!-- Logo -->
    <a href="#" class="logo">
      <div class="logo-icon">
        <svg width="30" height="26" viewBox="0 0 30 26" fill="none">
          <path d="M2 2L15 24L28 2" stroke="url(#lg1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 2L15 14L22 2" stroke="url(#lg2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
          <defs>
            <linearGradient id="lg1" x1="2" y1="2" x2="28" y2="24" gradientUnits="userSpaceOnUse">
              <stop stop-color="#00d4ff"/>
              <stop offset="1" stop-color="#9d4edd"/>
            </linearGradient>
            <linearGradient id="lg2" x1="8" y1="2" x2="22" y2="14" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7b2fff"/>
              <stop offset="1" stop-color="#00d4ff"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-text">VENKAT</span>
    </a>

    <!-- Desktop Nav Links -->
    <div class="nav-links">
      <a class="nav-link active" data-link>Home</a>
      <a class="nav-link" data-link>About</a>
      <a class="nav-link" data-link>Projects</a>
      <a class="nav-link" data-link>Skills</a>
      <a class="nav-link" data-link>Blog</a>
      <a class="nav-link" data-link>Contact</a>
    </div>

    <!-- CTA -->
    <a href="#" class="btn-cta">
      Let's Talk <span class="arrow">→</span>
    </a>

    <!-- Hamburger -->
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
      <a class="mobile-link active" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a class="mobile-link" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        About
      </a>
      <a class="mobile-link" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Projects
      </a>
      <a class="mobile-link" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Skills
      </a>
      <a class="mobile-link" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Blog
      </a>
      <a class="mobile-link" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Contact
      </a>
      <div class="mobile-cta">Let's Talk <span>→</span></div>
    </div>

  </nav>
</div>

<!-- ══ FEATURES ══ -->
<div class="features">

  <div class="feature feat-cyan">
    <div class="feature-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.6">
        <rect x="2" y="7" width="20" height="14" rx="3"/>
        <path d="M6 7V5a2 2 0 012-2h8a2 2 0 012 2v2"/>
        <line x1="12" y1="12" x2="12" y2="16"/>
        <circle cx="12" cy="18" r=".5" fill="#00d4ff"/>
      </svg>
    </div>
    <div>
      <div class="feature-label">Glassmorphism</div>
      <div class="feature-desc">Beautiful translucent glass effect</div>
    </div>
  </div>

  <div class="feature feat-violet">
    <div class="feature-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#7b2fff" stroke-width="1.6">
        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
    </div>
    <div>
      <div class="feature-label">3D Tilt Effect</div>
      <div class="feature-desc">Dynamic tilt with mouse movement</div>
    </div>
  </div>

  <div class="feature feat-pink">
    <div class="feature-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff2d78" stroke-width="1.6">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <div>
      <div class="feature-label">Neon Glow</div>
      <div class="feature-desc">Stunning neon glow &amp; blinking line</div>
    </div>
  </div>

  <div class="feature feat-blue">
    <div class="feature-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#4fc3f7" stroke-width="1.6">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
        <rect x="14" y="7" width="4" height="6" rx="1"/>
      </svg>
    </div>
    <div>
      <div class="feature-label">Fully Responsive</div>
      <div class="feature-desc">Perfect on all devices</div>
    </div>
  </div>

</div>

<script>
  /* ── 3D Tilt Effect ── */
  const scene  = document.getElementById('navScene');
  const navbar = document.getElementById('navbar');

  scene.addEventListener('mousemove', (e) => {
    const rect = scene.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    const dx = (e.clientX - cx) / (rect.width  / 2);
    const dy = (e.clientY - cy) / (rect.height / 2);
    const rotX = -dy * 6;
    const rotY =  dx * 10;
    navbar.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  });

  scene.addEventListener('mouseleave', () => {
    navbar.style.transition = 'transform 0.6s cubic-bezier(0.23,1,0.32,1)';
    navbar.style.transform  = 'rotateX(0deg) rotateY(0deg)';
    setTimeout(() => { navbar.style.transition = 'transform 0.1s ease-out'; }, 600);
  });

  /* ── Active link click ── */
  document.querySelectorAll('[data-link]').forEach(link => {
    link.addEventListener('click', () => {
      document.querySelectorAll('[data-link]').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
    });
  });

  /* ── Hamburger toggle ── */
  const hamburger  = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');

  hamburger.addEventListener('click', () => {
    mobileMenu.classList.toggle('open');
  });

  document.addEventListener('click', (e) => {
    if (!navbar.contains(e.target)) {
      mobileMenu.classList.remove('open');
    }
  });

  /* ── Mobile link active ── */
  document.querySelectorAll('.mobile-link').forEach(link => {
    link.addEventListener('click', () => {
      document.querySelectorAll('.mobile-link').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
    });
  });
</script>
</body>
</html>
